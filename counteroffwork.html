<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>下班倒數計時器 + 天氣 + 新聞</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: #fff;
      text-align: center;
      padding-top: 30px;
    }
    h1 { font-size: 3em; margin-bottom: 20px; }
    #clock { font-size: 2em; margin-bottom: 20px; }
    #countdown { font-size: 2.5em; font-weight: bold; margin-top: 20px; }
    .input-area { margin-top: 20px; }
    input[type="time"] {
      font-size: 1.2em; padding: 5px 10px; border-radius: 5px; border: none;
    }
    button {
      font-size: 1.2em; padding: 5px 15px; margin-left: 10px;
      border-radius: 5px; border: none; background-color: #ff9800;
      color: #fff; cursor: pointer;
    }
    button:hover { background-color: #e68900; }
    #weather-box, #news-box {
      margin-top: 40px; padding: 20px; background: rgba(0,0,0,0.3);
      border-radius: 10px; display: inline-block; text-align: left;
    }
    #weather-box h2, #news-box h2 { margin-bottom: 10px; }
    #news-list { padding-left: 20px; }
    #news-list li { margin-bottom: 5px; }
    #news-list a { color: #fff; text-decoration: none; }
    #news-list a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>下班倒數計時器</h1>

  <!-- 即時時鐘 -->
  <div id="clock">現在時間載入中...</div>

  <!-- 下班時間設定 -->
  <div class="input-area">
    <label for="offWorkTime">設定下班時間：</label>
    <input type="time" id="offWorkTime" value="17:30">
    <button onclick="setOffWorkTime()">更新</button>
  </div>

  <!-- 倒數計時 -->
  <div id="countdown">計算中...</div>

  <!-- 天氣框 -->
  <div id="weather-box">
    <h2>目前天氣</h2>
    <div id="weather">載入中...</div>
  </div>

  <!-- 新聞框 -->
  <div id="news-box">
    <h2>台灣十大新聞</h2>
    <label for="sourceSelect">選擇新聞來源：</label>
    <select id="sourceSelect" onchange="fetchNews()">
      <option value="yahoo">Yahoo 新聞</option>
      <option value="ctee">工商時報</option>
    </select>
    <ul id="news-list">
      <li>載入中...</li>
    </ul>
  </div>

  <script>
    // 下班倒數計時
    let offWorkHour = 17;
    let offWorkMinute = 30;

    function setOffWorkTime() {
      const timeInput = document.getElementById("offWorkTime").value;
      if (timeInput) {
        const [hour, minute] = timeInput.split(":").map(Number);
        offWorkHour = hour;
        offWorkMinute = minute;
      }
    }

    function updateCountdown() {
      const now = new Date();
      const offWork = new Date();
      offWork.setHours(offWorkHour, offWorkMinute, 0, 0);

      if (now > offWork) {
        document.getElementById("countdown").textContent = "已下班 🎉";
        return;
      }

      const diff = offWork - now;
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("countdown").textContent =
        `${hours} 小時 ${minutes} 分鐘 ${seconds} 秒`;
    }

    // 即時時鐘
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `現在時間：${h}:${m}:${s}`;
    }

    setInterval(() => {
      updateClock();
      updateCountdown();
    }, 1000);

    updateClock();
    updateCountdown();

    // 天氣 API (OpenWeatherMap)
    const apiKey = "b58b4b5a6c4b8680563e249d2d74d344"; // ← 換成你自己的 API key

    function fetchWeather(lat, lon) {
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&lang=zh_tw&units=metric`)
        .then(response => response.json())
        .then(data => {
          if (data.cod !== 200) {
            document.getElementById("weather").textContent = "天氣資料錯誤";
            return;
          }
          const weatherDesc = data.weather[0].description;
          const temp = data.main.temp;
          const city = data.name;
          document.getElementById("weather").textContent =
            `${city}：${weatherDesc}，${temp}°C`;
        })
        .catch(() => {
          document.getElementById("weather").textContent = "無法取得天氣資料";
        });
    }

    function initWeather() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          position => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            fetchWeather(lat, lon);
            setInterval(() => fetchWeather(lat, lon), 60000);
          },
          () => {
            document.getElementById("weather").textContent = "定位失敗，請允許位置存取";
          }
        );
      } else {
        document.getElementById("weather").textContent = "瀏覽器不支援定位功能";
      }
    }

    initWeather();

    // 新聞 RSS 抓取
    async function fetchNews() {
      const source = document.getElementById("sourceSelect").value;
      let rssUrl = "";

      if (source === "yahoo") {
        rssUrl = "https://tw.news.yahoo.com/rss";
      } else if (source === "ctee") {
        rssUrl = "https://www.ctee.com.tw/rss"; // 工商時報 RSS
      }

      try {
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
        const data = await response.json();
        const parser = new DOMParser();
        const xml = parser.parseFromString(data.contents, "text/xml");
        const items = xml.querySelectorAll("item");

        const newsList = document.getElementById("news-list");
        newsList.innerHTML = ""; // 清空舊內容

        items.forEach((item, index) => {
          if (index < 10) {
            const title = item.querySelector("title").textContent;
            const link = item.querySelector("link").textContent;

            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = link;
            a.textContent = title;
            a.target = "_blank"; // 新分頁開啟
            li.appendChild(a);
            newsList.appendChild(li);
          }
        });
      } catch (error) {
        document.getElementById("news-list").innerHTML = "<li>無法取得新聞資料</li>";
      }
    }

    // 頁面載入時抓取一次
    fetchNews();
    // 每 30 分鐘更新一次
    setInterval(fetchNews, 1800000);
  </script>
</body>
</html>
