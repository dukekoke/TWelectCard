<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>俄羅斯方塊對戰版</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      background: #222;
      border: 2px solid #0f0;
      margin: 10px;
    }
    .info {
      margin: 10px;
      font-size: 18px;
    }
    .board {
      display: flex;
      flex-direction: row;
    }
  </style>
</head>
<body>
  <div>
    房間代號: <input id="roomId" value="room1">
    <button onclick="joinRoom()">加入房間</button>
  </div>
  <div class="board">
    <div>
      <canvas id="tetris" width="240" height="400"></canvas>
      <div class="info">
        分數: <span id="score">0</span>　
        等級: <span id="level">1</span>
      </div>
    </div>
    <div>
      <canvas id="opponent" width="240" height="400"></canvas>
      <div class="info">
        對手分數: <span id="opponentScore">0</span>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(20, 20);

    const scoreElem = document.getElementById('score');
    const levelElem = document.getElementById('level');
    const opponentCanvas = document.getElementById('opponent');
    const opponentContext = opponentCanvas.getContext('2d');
    opponentContext.scale(20, 20);
    const opponentScoreElem = document.getElementById('opponentScore');

    let score = 0;
    let level = 1;
    let opponentArena = [];
    let opponentScore = 0;

    // WebSocket
    let socket;
    function joinRoom() {
      const roomId = document.getElementById('roomId').value;
      socket = new WebSocket('ws://192.168.1.107:8080'); // 換成伺服器IP

      socket.addEventListener('open', () => {
        socket.send(JSON.stringify({ type: 'join', roomId }));
        console.log('已加入房間:', roomId);
      });

      socket.addEventListener('message', event => {
        const data = JSON.parse(event.data);
        if (data.type === 'update') {
          opponentArena = data.arena;
          opponentScore = data.score;
          drawOpponent();
        } else if (data.type === 'garbage') {
          addGarbage(data.lines);
        }
      });
    }

    function sendUpdate() {
      if (!socket) return;
      const data = {
        type: 'update',
        arena: arena,
        score: score,
      };
      socket.send(JSON.stringify(data));
    }

    function sendGarbage(lines) {
      if (!socket) return;
      const data = {
        type: 'garbage',
        lines: lines
      };
      socket.send(JSON.stringify(data));
    }

    function drawOpponent() {
      opponentContext.fillStyle = '#000';
      opponentContext.fillRect(0, 0, opponentCanvas.width, opponentCanvas.height);
      opponentArena.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            opponentContext.fillStyle = '#999';
            opponentContext.fillRect(x, y, 1, 1);
          }
        });
      });
      opponentScoreElem.innerText = opponentScore;
    }

    // 遊戲邏輯
    function arenaSweep() {
      let rowCount = 1;
      let cleared = 0;
      outer: for (let y = arena.length - 1; y >= 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
          if (arena[y][x] === 0) {
            continue outer;
          }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        score += rowCount * 10;
        rowCount *= 2;
        cleared++;
      }
      if (cleared > 0) {
        sendGarbage(cleared);
      }
      updateScore();
    }

    function addGarbage(lines) {
      for (let i = 0; i < lines; i++) {
        const row = new Array(arena[0].length).fill(8);
        const hole = Math.floor(Math.random() * arena[0].length);
        row[hole] = 0;
        arena.shift();
        arena.push(row);
      }
    }

    function updateScore() {
      scoreElem.innerText = score;
      if (score >= level * 100) {
        level++;
        dropInterval = Math.max(200, dropInterval - 100);
      }
      levelElem.innerText = level;
      sendUpdate();
    }

    function collide(arena, player) {
      const m = player.matrix;
      const o = player.pos;
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 &&
              (arena[y + o.y] &&
               arena[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

    function createMatrix(w, h) {
      const matrix = [];
      while (h--) {
        matrix.push(new Array(w).fill(0));
      }
      return matrix;
    }

    function createPiece(type) {
      if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
      else if (type === 'O') return [[2,2],[2,2]];
      else if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
      else if (type === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
      else if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
      else if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
      else if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            context.fillStyle = colors[value];
            context.fillRect(x + offset.x, y + offset.y, 1, 1);
          }
        });
      });
    }

    function draw() {
      context.fillStyle = '#000';
      context.fillRect(0, 0, canvas.width, canvas.height);
      drawMatrix(arena, {x:0, y:0});
      drawMatrix(player.matrix, player.pos);
    }

    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
      }
      dropCounter = 0;
    }

    function playerMove(dir) {
      player.pos.x += dir;
      if (collide(arena, player)) {
        player.pos.x -= dir;
      }
    }

    function playerReset() {
      const pieces = 'TJLOSZI';
      player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
      player.pos.y = 0;
      player.pos.x = (arena[0].length / 2 | 0) -
                     (player.matrix[0].length / 2 | 0);
      if (collide(arena, player)) {
        arena.forEach(row => row.fill(0));
        score = 0;
        level = 1;
        dropInterval = 1000;
        updateScore();
      }
    }
